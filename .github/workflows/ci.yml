name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build Kaappi
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build

      - name: Build native library
        run: make

      - name: Run tests
        run: |
          for f in tests/*.scm; do
            echo "=== $f ==="
            /tmp/kaappi/zig-out/bin/kaappi --coverage-xml coverage.xml --lib-path lib "$f"
          done
        env:
          LD_LIBRARY_PATH: .
          DYLD_LIBRARY_PATH: .

      - name: Upload to Codecov
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: kaappi/kaappi-sqlite
          files: coverage.xml
          fail_ci_if_error: false
